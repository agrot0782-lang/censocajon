<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Terraflux Control</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- 📊 GRAFICA -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}
h2 { color: #22c55e; }

#reader {
    width: 320px;
    margin: auto;
    border-radius: 15px;
    overflow: hidden;
}

input, button {
    padding: 12px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

button {
    background: #22c55e;
    color: white;
    font-weight: bold;
}

table {
    width: 95%;
    margin: auto;
    margin-top: 15px;
    border-collapse: collapse;
    background: #1e293b;
}

td, th {
    padding: 10px;
    border-bottom: 1px solid #334155;
}

.card {
    background:#1e293b;
    padding:10px 20px;
    border-radius:10px;
    width:120px;
}
</style>
</head>

<body>

<h2>Terraflux Control</h2>

<input type="number" id="trailaInicial" placeholder="Traila inicial">
<input type="number" id="capacidad" placeholder="Camas por traila">
<button onclick="camaVacia()">🛏️ Cama Vacía</button>

<div id="reader"></div>

<h3>Total: <span id="contador">0</span></h3>

<table>
<thead>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Traila</th>
<th>Cama</th>
<th>Hora</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<script>

let ids = new Set();
let camasOcupadas = new Set();
let chart;

// 🔥 LOCAL STORAGE
function guardar(data){
    localStorage.setItem("terraflux", JSON.stringify(data));
}

function obtener(){
    return JSON.parse(localStorage.getItem("terraflux")) || {};
}

// SCAN
function onScanSuccess(decodedText){

    let id = decodedText.trim();

    if(ids.has(id)){
        alert("Duplicado");
        return;
    }

    let traila = document.getElementById("trailaInicial").value;
    let cama = document.getElementById("capacidad").value;

    if(!traila || !cama){
        alert("Faltan datos");
        return;
    }

    let clave = traila + "-" + cama;

    if(camasOcupadas.has(clave)){
        alert("Cama ocupada");
        return;
    }

    let data = obtener();

    data[id] = {
        id,
        nombre:"OK",
        trailaActual:traila,
        camaActual:cama,
        hora:new Date().toLocaleTimeString()
    };

    guardar(data);
    render();
}

// RENDER
function render(){

    let data = obtener();

    ids.clear();
    camasOcupadas.clear();

    let tabla = document.getElementById("tabla");
    tabla.innerHTML = "";

    Object.values(data).forEach(r => {

        let clave = r.trailaActual + "-" + r.camaActual;

        ids.add(r.id);
        camasOcupadas.add(clave);

        tabla.innerHTML += `
        <tr>
            <td>${r.id}</td>
            <td>${r.nombre}</td>
            <td>${r.trailaActual}</td>
            <td>${r.camaActual}</td>
            <td>${r.hora}</td>
            <td><button onclick="borrar('${r.id}')">❌</button></td>
        </tr>`;
    });

    document.getElementById("contador").innerText = Object.keys(data).length;
}

// BORRAR
function borrar(id){
    let data = obtener();
    delete data[id];
    guardar(data);
    render();
}

// RESET
function reset(){
    localStorage.removeItem("terraflux");
    render();
}

// CAMA VACÍA
function camaVacia(){

    let traila = document.getElementById("trailaInicial").value;
    let cama = document.getElementById("capacidad").value;

    let id = "VACIA_" + Date.now();

    let data = obtener();

    data[id] = {
        id,
        nombre:"N/A",
        trailaActual:traila,
        camaActual: cama + " - VACÍA",
        hora:new Date().toLocaleTimeString()
    };

    guardar(data);
    render();
}

// INICIO
render();

let scanner = new Html5QrcodeScanner("reader",{fps:10,qrbox:250});
scanner.render(onScanSuccess);

</script>

</body>
</html>
