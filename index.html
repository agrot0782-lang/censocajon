<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Censo de Camas</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    padding:20px;
}
.container{
    max-width:900px;
    margin:auto;
}
h2{text-align:center;}
.form{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    margin-bottom:20px;
}
input{
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}
button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
}
.btn-normal{ background:#007bff; }
.btn-vacio{ background:#6c757d; }
.btn-fuera{ background:#dc3545; }

table{
    width:100%;
    background:white;
    border-collapse:collapse;
    border-radius:10px;
    overflow:hidden;
}
th{
    background:#343a40;
    color:white;
    padding:10px;
}
td{
    padding:8px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

.vacio{ color:#6c757d; font-weight:bold; }
.fuera{ color:#dc3545; font-weight:bold; }
.ocupado{ color:#28a745; font-weight:bold; }

.ok{ background:#d4edda !important; }
.error{ background:#f8d7da !important; }
</style>

</head>

<body>

<div class="container">

<h2>🛏️ Censo Trailas Cajon</h2>

<div id="reader" style="width:300px; margin:auto;"></div>

<div style="display:flex; gap:15px; justify-content:center; margin:20px 0;">
    <div>🟢 Ocupadas: <b id="ocupadas">0</b></div>
    <div>⚪ Vacías: <b id="vacias">0</b></div>
    <div>🔴 Fuera: <b id="fuera">0</b></div>
    <div>📊 Total: <b id="total">0</b></div>
</div>

<div class="form">
<input type="number" id="traila" placeholder="Traila">
<input type="number" id="cama" placeholder="Cama">

<input type="text" id="idTrabajador" placeholder="ID">
<input type="text" id="nombre" placeholder="Nombre">
<input type="text" id="apellidos" placeholder="Apellidos">
<input type="text" id="sexo" placeholder="Sexo">

<input type="text" id="observacion" placeholder="Observaciones">

<button class="btn-normal" onclick="registrar('OCUPADO')">Registrar</button> <button class="btn-vacio" onclick="registrar('VACIA')">Vacía</button> <button class="btn-fuera" onclick="registrar('FUERA')">Fuera</button> <button onclick="borrarTodo()" style="background:#000;">
🧨 Reiniciar Censo </button><button onclick="descargarTrabajadores()" style="background:#17a2b8;">
⬇️ Cargar Trabajadores
</button>

</div>

<table>
<thead>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Apellidos</th>
<th>Traila</th>
<th>Cama</th>
<th>Sexo</th>
<th>Estado</th>
<th>Observación</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<script>

// 🔥 LOCAL STORAGE
let lista = JSON.parse(localStorage.getItem("censo_local") || "[]");

let qr, ultimoID = "";

// GUARDAR
function guardarLocal(){
    localStorage.setItem("censo_local", JSON.stringify(lista));
}

// 🔥 REGISTRAR
function registrar(estado){

    let traila = document.getElementById("traila").value;
    let cama = parseInt(document.getElementById("cama").value);

    let id = document.getElementById("idTrabajador").value;
    let nombre = document.getElementById("nombre").value;
    let apellidos = document.getElementById("apellidos").value;
    let sexo = document.getElementById("sexo").value;
    let obs = document.getElementById("observacion").value;

    if(!traila || !cama){
        alert("Faltan datos");
        return;
    }

    let existente = lista.find(p => p.id == id && p.estado === "OCUPADO");

    if(existente){
        document.body.classList.add("error");
        setTimeout(()=>document.body.classList.remove("error"), 300);
        beepError();
        return;
    }

    lista.push({
        id,nombre,apellidos,traila,cama,sexo,estado,
        observacion: obs,
        timestamp: Date.now()
    });

    guardarLocal();
    render();

    document.body.classList.add("ok");
    setTimeout(()=>document.body.classList.remove("ok"), 300);
    beepOK();

    limpiarCampos();

    document.getElementById("cama").value = cama + 1;
    document.getElementById("idTrabajador").focus();
}

// LIMPIAR
function limpiarCampos(){
    document.getElementById("idTrabajador").value = "";
    document.getElementById("nombre").value = "";
    document.getElementById("apellidos").value = "";
    document.getElementById("sexo").value = "";
    document.getElementById("observacion").value = "";
}

// 🔥 RENDER
function render(){
    let html = "";

    lista.forEach((p,i)=>{

        let clase = p.estado === "VACIA" ? "vacio" :
                    p.estado === "FUERA" ? "fuera" : "ocupado";

        html += `
        <tr>
            <td>${p.id}</td>
            <td>${p.nombre}</td>
            <td>${p.apellidos}</td>
            <td>${p.traila}</td>
            <td>${p.cama}</td>
            <td>${p.sexo}</td>
            <td class="${clase}">${p.estado}</td>
            <td>${p.observacion || "-"}</td>
            <td><button onclick="eliminar(${i})" style="background:#dc3545;">🗑</button></td>
        </tr>`;
    });

    document.getElementById("tabla").innerHTML = html;
    actualizarContadores();
}

// CONTADORES
function actualizarContadores(){

    let ocupadas=0,vacias=0,fuera=0;

    lista.forEach(p =>{
        if(p.estado==="OCUPADO") ocupadas++;
        else if(p.estado==="VACIA") vacias++;
        else if(p.estado==="FUERA") fuera++;
    });

    document.getElementById("ocupadas").innerText=ocupadas;
    document.getElementById("vacias").innerText=vacias;
    document.getElementById("fuera").innerText=fuera;
    document.getElementById("total").innerText=lista.length;
}

// ELIMINAR
function eliminar(i){
    if(confirm("¿Eliminar este registro?")){
        lista.splice(i,1);
        guardarLocal();
        render();
    }
}

// BORRAR TODO
function borrarTodo(){
    if(confirm("⚠️ Esto borrará todo el censo. ¿Continuar?")){
        lista = [];
        guardarLocal();
        render();
    }
}

// 🔊 SONIDOS
function beepOK(){
    let ctx = new (window.AudioContext || window.webkitAudioContext)();
    let osc = ctx.createOscillator();
    osc.frequency.value = 800;
    osc.connect(ctx.destination);
    osc.start();
    setTimeout(()=>osc.stop(),150);
}

function beepError(){
    let ctx = new (window.AudioContext || window.webkitAudioContext)();
    let osc = ctx.createOscillator();
    osc.frequency.value = 200;
    osc.connect(ctx.destination);
    osc.start();
    setTimeout(()=>osc.stop(),300);
}

// 🔥 QR
function iniciarEscaneo(){

    qr = new Html5Qrcode("reader");

    qr.start({ facingMode: "environment" }, { fps:10, qrbox:250 },
    (decodedText)=>{

        let id = decodedText.trim();

        if(id === ultimoID) return;

        ultimoID = id;

       let input = document.getElementById("idTrabajador");

input.value = id;

// 🔥 DISPARA EL AUTOCOMPLETADO
input.dispatchEvent(new Event('input'));
    });
}

// INICIO
window.addEventListener("load",()=>{

    document.getElementById("idTrabajador").addEventListener("input", function () {

        let id = this.value.trim();

        if(id.length < 4) return; // 🔥 bajamos para probar

        let trabajadores = JSON.parse(localStorage.getItem("trabajadores") || "{}");

        console.log("Buscando:", id);
        console.log("DB:", trabajadores);

        let t = trabajadores[id];

        if(t){

            document.getElementById("nombre").value = t.nombre || "";

            document.getElementById("apellidos").value =
                (t.apellido_paterno || "") + " " + (t.apellido_materno || "");

            document.getElementById("sexo").value = t.sexo || "";

            document.body.classList.add("ok");
            beepOK();

        } else {

            console.warn("NO encontrado:", id);

            document.body.classList.add("error");
            beepError();
        }

        setTimeout(()=>{
            document.body.classList.remove("ok");
            document.body.classList.remove("error");
        },300);
    });

});
// 🔥 FIREBASE (solo para descargar)
var firebaseConfig = {
 apiKey: "AIzaSyDz4RqKjSJxB0F5eP4RzajQtW94cPXmpSg",
 databaseURL: "https://data-b6691-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// ==========================
// 🔥 DESCARGAR TRABAJADORES
// ==========================
async function descargarTrabajadores(){

    try{
        let snapshot = await db.ref("trabajadores").once("value");

        let data = snapshot.val();

        if(!data){
            alert("No hay trabajadores");
            return;
        }

        let limpio = {};

        // 🔥 TRANSFORMAR FORMATO
        Object.values(data).forEach(t => {

            if(t.id){
                limpio[t.id] = t;
            }

        });

        localStorage.setItem("trabajadores", JSON.stringify(limpio));

        console.log("🔥 Trabajadores convertidos:", limpio);

        alert("✅ Trabajadores listos para uso offline");

    }catch(e){
        alert("Error al descargar");
        console.error(e);
    }
}


// ==========================
// 🔥 AUTOCOMPLETAR OFFLINE
// ==========================
document.getElementById("idTrabajador").addEventListener("input", function () {

    let id = this.value.trim();

    if(id.length < 8) return;

    let trabajadores = JSON.parse(localStorage.getItem("trabajadores") || "{}");

    let t = trabajadores[id] || trabajadores[parseInt(id)];

    if(t){

        document.getElementById("nombre").value = t.nombre || "";

        document.getElementById("apellidos").value =
            (t.apellido_paterno || "") + " " + (t.apellido_materno || "");

        document.getElementById("sexo").value = t.sexo || "";

        document.body.classList.add("ok");
        beepOK();

    } else {

        document.body.classList.add("error");
        beepError();
    }

    setTimeout(()=>{
        document.body.classList.remove("ok");
        document.body.classList.remove("error");
    },300);
});

</script>

</body>
</html>
