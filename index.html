<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Censo de Camas</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    padding:20px;
}
.container{
    max-width:900px;
    margin:auto;
}
h2{text-align:center;}
.form{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    margin-bottom:20px;
}
input{
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}
button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
}
.btn-normal{ background:#007bff; }
.btn-vacio{ background:#6c757d; }

table{
    width:100%;
    background:white;
    border-collapse:collapse;
    border-radius:10px;
    overflow:hidden;
}
th{
    background:#343a40;
    color:white;
    padding:10px;
}
td{
    padding:8px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

.vacio{ color:#6c757d; font-weight:bold; }
.fuera{ color:#dc3545; font-weight:bold; }
.ocupado{ color:#28a745; font-weight:bold; }

.ok{ background:#d4edda !important; }
.error{ background:#f8d7da !important; }
</style>

</head>

<body>

<div class="container">

<h2>🛏️ Censo Trailas Cajon</h2>

<div id="reader" style="width:300px; margin:auto;"></div>

<div style="display:flex; gap:15px; justify-content:center; margin:20px 0;">
    <div>🟢 Ocupadas: <b id="ocupadas">0</b></div>
    <div>⚪ Vacías: <b id="vacias">0</b></div>
    <div>🔴 Fuera: <b id="fuera">0</b></div>
    <div>📊 Total: <b id="total">0</b></div>
</div>

<div class="form">
<input type="number" id="traila" placeholder="Traila">
<input type="number" id="cama" placeholder="Cama">

<input type="text" id="idTrabajador" placeholder="ID">
<input type="text" id="nombre" placeholder="Nombre">
<input type="text" id="apellidos" placeholder="Apellidos">
<input type="text" id="sexo" placeholder="Sexo">

<input type="text" id="observacion" placeholder="Observaciones">

<button class="btn-normal" onclick="registrar('OCUPADO')">Registrar</button> <button class="btn-vacio" onclick="registrar('VACIA')">Vacía</button> <button class="btn-fuera" onclick="registrar('FUERA')">Fuera</button> <button onclick="borrarTodo()" style="background:#000;">
🧨 Reiniciar Censo </button>

</div>

<table>
<thead>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Apellidos</th>
<th>Traila</th>
<th>Cama</th>
<th>Sexo</th>
<th>Estado</th>
<th>Observación</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<script>

// 🔥 FIREBASE
var firebaseConfig = {
 apiKey: "AIzaSyDz4RqKjSJxB0F5eP4RzajQtW94cPXmpSg",
 authDomain: "data-b6691.firebaseapp.com",
 databaseURL: "https://data-b6691-default-rtdb.firebaseio.com",
 projectId: "data-b6691",
 storageBucket: "data-b6691.firebasestorage.app",
 messagingSenderId: "932857865624",
 appId: "1:932857865624:web:20408d56e0a821aae737ed"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

let lista = [];
let qr, ultimoID = "";

// 🔥 OFFLINE STORAGE
function guardarPendiente(path,data){
    let p = JSON.parse(localStorage.getItem("pendientes")||"[]");
    p.push({path,data});
    localStorage.setItem("pendientes",JSON.stringify(p));
}

const _set = firebase.database.Reference.prototype.set;

firebase.database.Reference.prototype.set = function(data){

    let path = this.toString().split(".com/")[1];

    if(navigator.onLine){
        return _set.call(this,data);
    }else{
        guardarPendiente(path,data);
        return Promise.resolve();
    }
};

window.addEventListener("online", async ()=>{
    let p = JSON.parse(localStorage.getItem("pendientes")||"[]");

    for(let item of p){
        await db.ref(item.path).set(item.data);
    }

    localStorage.removeItem("pendientes");
});

// 🔥 REGISTRAR
function registrar(estado){

    let traila = document.getElementById("traila").value;
    let cama = parseInt(document.getElementById("cama").value);

    let id = document.getElementById("idTrabajador").value;
    let nombre = document.getElementById("nombre").value;
    let apellidos = document.getElementById("apellidos").value;
    let sexo = document.getElementById("sexo").value;
    let obs = document.getElementById("observacion").value;

    if(!traila || !cama){
        alert("Faltan datos");
        return;
    }

    if(!nombre || nombre.trim()===""){
        alert("⏳ Espera a que carguen los datos");
        beepError();
        return;
    }

    let key = traila + "_" + cama;

    db.ref("censo_cajon/" + key).set({
        id,nombre,apellidos,traila,cama,sexo,estado,
        observacion: obs,
        timestamp: Date.now()
    });

    beepOK();
    limpiarCampos();

    document.getElementById("cama").value = cama + 1;
    document.getElementById("idTrabajador").focus();
}

// 🔍 AUTOCOMPLETAR + CACHE
document.getElementById("idTrabajador").addEventListener("input", function(){

    let id = this.value.trim();
    if(id.length < 8) return;

    if(navigator.onLine){

        db.ref("trabajadores/" + id).once("value")
        .then(s=>{

            let t = s.val();

            if(t){

                let cache = JSON.parse(localStorage.getItem("trabajadores")||"{}");
                cache[id]=t;
                localStorage.setItem("trabajadores",JSON.stringify(cache));

                llenar(t);
            }
        });

    }else{

        let cache = JSON.parse(localStorage.getItem("trabajadores")||"{}");
        let t = cache[id];

        if(t) llenar(t);
        else beepError();
    }
});

function llenar(t){
    document.getElementById("nombre").value = t.nombre||"";
    document.getElementById("apellidos").value =
    (t.apellido_paterno||"")+" "+(t.apellido_materno||"");
    document.getElementById("sexo").value = t.sexo||"";
}

// 🔥 QR
function iniciarEscaneo(){

    qr = new Html5Qrcode("reader");

    qr.start({ facingMode: "environment" }, { fps:10, qrbox:250 },
    (decodedText)=>{

        let id = decodedText.trim();
        if(id === ultimoID) return;
        ultimoID = id;

        let input = document.getElementById("idTrabajador");
        input.value = id;
        input.dispatchEvent(new Event('input'));

        // 🔥 ESPERA DATOS ANTES DE GUARDAR
        let intento = setInterval(()=>{

            let nombre = document.getElementById("nombre").value;

            if(nombre && nombre.trim() !== ""){
                clearInterval(intento);
                registrar("OCUPADO");
            }

        },100);
    });
}

// resto igual...

</script>

</body>
</html>
