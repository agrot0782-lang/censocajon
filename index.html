<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Terraflux Control</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}
h2 { color: #22c55e; }

#reader {
    width: 320px;
    margin: auto;
    border-radius: 15px;
    overflow: hidden;
}

input, button {
    padding: 12px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

button {
    background: #22c55e;
    color: white;
    font-weight: bold;
}

table {
    width: 95%;
    margin: auto;
    margin-top: 15px;
    border-collapse: collapse;
    background: #1e293b;
}

td, th {
    padding: 10px;
    border-bottom: 1px solid #334155;
}

.card {
    background:#1e293b;
    padding:10px 20px;
    border-radius:10px;
    width:120px;
}
</style>
</head>

<body>

<h2>Terraflux Control</h2>

<input type="file" id="excelFile">
<br>
<input type="number" id="trailaInicial" placeholder="Traila inicial">
<input type="number" id="capacidad" placeholder="Camas por traila">
<button onclick="camaVacia()">🛏️ Cama Vacía</button>

<div id="reader"></div>

<h3>Total: <span id="contador">0</span></h3>
<h3>🚚 Traila: <span id="trailaActual">-</span> | 🛏️ Cama: <span id="camaActual">-</span></h3>

<button onclick="reset()">🔄 Reiniciar</button>
<button onclick="descargarExcel()">📥 Descargar</button>

<div id="dashboard" style="display:flex; gap:15px; justify-content:center; flex-wrap:wrap; margin:15px;">
  <div class="card"><h4>Total</h4><span id="dTotal">0</span></div>
  <div class="card"><h4>Ocupadas</h4><span id="dOcupadas">0</span></div>
  <div class="card"><h4>Vacías</h4><span id="dVacias">0</span></div>
  <div class="card"><h4>Trailas</h4><span id="dTrailas">0</span></div>
</div>

<canvas id="grafica" style="max-width:500px; margin:auto;"></canvas>

<table>
<thead>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Traila</th>
<th>Cama</th>
<th>Hora</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<audio id="beep" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>

<script>

let baseDatos = {};
let registros = [];
let ids = new Set();
let camasOcupadas = new Set();
let chart;

// 🔥 LOCAL STORAGE
function guardar(data){
    localStorage.setItem("terraflux", JSON.stringify(data));
}
function obtener(){
    return JSON.parse(localStorage.getItem("terraflux")) || {};
}

// SCAN
function onScanSuccess(decodedText) {

    let id = decodedText.trim();

    if(ids.has(id)){
        feedback("error");
        return;
    }

    let trailaActual = document.getElementById("trailaInicial").value;
    let camaActual = document.getElementById("capacidad").value;

    if(!trailaActual || !camaActual){
        alert("Ingresa traila y cama");
        return;
    }

    let clave = trailaActual + "-" + camaActual;

    if(camasOcupadas.has(clave)){
        alert("⚠️ Cama ocupada");
        feedback("error");
        return;
    }

    let nombre = baseDatos[id] || "NO ENCONTRADO";

    ids.add(id);
    camasOcupadas.add(clave);

    let hora = new Date().toLocaleTimeString();

    let data = obtener();
    data[id] = {id, nombre, trailaActual, camaActual, hora};

    guardar(data);
    render();

    feedback("ok");
}

// 🔄 RENDER (ANTES ERA FIREBASE)
function render(){

    let data = obtener();

    registros = [];
    ids.clear();
    camasOcupadas.clear();
    document.getElementById("tabla").innerHTML = "";

    Object.values(data).forEach(r => {

        let camaLimpia = String(r.camaActual).replace(" - VACÍA","");
        let clave = r.trailaActual + "-" + camaLimpia;

        ids.add(r.id);
        camasOcupadas.add(clave);
        registros.push(r);

        let fila = `<tr>
            <td>${r.id}</td>
            <td>${r.nombre}</td>
            <td>${r.trailaActual}</td>
            <td>${r.camaActual}</td>
            <td>${r.hora}</td>
            <td><button onclick="borrar('${r.id}')">❌</button></td>
        </tr>`;

        document.getElementById("tabla").innerHTML += fila;
    });

    document.getElementById("contador").innerText = registros.length;

    actualizarDashboard(data);
}

// DASHBOARD (igual)
function actualizarDashboard(data){

    let lista = Object.values(data || {});
    
    let total = lista.length;
    let vacias = lista.filter(r => String(r.camaActual).includes("VACÍA")).length;
    let ocupadas = total - vacias;

    let trailas = new Set(lista.map(r => r.trailaActual));

    document.getElementById("dTotal").innerText = total;
    document.getElementById("dOcupadas").innerText = ocupadas;
    document.getElementById("dVacias").innerText = vacias;
    document.getElementById("dTrailas").innerText = trailas.size;

    let datos = {
        labels: ["Ocupadas","Vacías"],
        datasets: [{ data: [ocupadas, vacias] }]
    };

    if(chart){
        chart.data = datos;
        chart.update();
        return;
    }

    chart = new Chart(document.getElementById("grafica"), {
        type: "doughnut",
        data: datos
    });
}

// BORRAR
function borrar(id){
    let data = obtener();
    delete data[id];
    guardar(data);
    render();
}

// RESET
function reset(){
    if(confirm("Reiniciar todo?")){
        localStorage.removeItem("terraflux");
        render();
    }
}

// CAMA VACÍA
function camaVacia(){
    let trailaActual = document.getElementById("trailaInicial").value;
    let camaActual = document.getElementById("capacidad").value;

    let id = "VACIA_" + Date.now();

    let data = obtener();

    data[id] = {
        id,
        nombre:"N/A",
        trailaActual,
        camaActual: camaActual + " - VACÍA",
        hora:new Date().toLocaleTimeString()
    };

    guardar(data);
    render();
}

// SONIDO
function feedback(tipo){
    document.body.className = tipo;
    document.getElementById("beep").play();
    setTimeout(()=>document.body.className="",300);
}

// INICIO
render();

let scanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 });
scanner.render(onScanSuccess);


document.getElementById("excelFile").addEventListener("change", function(e){

    let file = e.target.files[0];
    let reader = new FileReader();

    reader.onload = function(e){
        let data = new Uint8Array(e.target.result);
        let workbook = XLSX.read(data, {type: "array"});

        let hoja = workbook.Sheets[workbook.SheetNames[0]];
        let json = XLSX.utils.sheet_to_json(hoja);

        baseDatos = {}; // 🔥 reset

        json.forEach(row => {
            // 👇 ajusta según tu Excel
            let id = String(row.ID || row.id || row.Id).trim();
            let nombre = row.NOMBRE || row.Nombre || row.nombre;

            if(id){
                baseDatos[id] = nombre;
            }
        });

        alert("Excel cargado correctamente ✅");
        console.log(baseDatos);
    };

    reader.readAsArrayBuffer(file);
});
    
</script>
</body>
</html>
