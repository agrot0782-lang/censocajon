<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Censo Trailas Cajon</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    padding:20px;
}

/* ZONAS */
.zonas-box{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.zonas-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.bars{
    display:flex;
    align-items:flex-end;
    gap:10px;
    height:180px;
}

.bar{
    flex:1;
    text-align:center;
}

.fill{
    width:100%;
    border-radius:8px 8px 0 0;
}

/* LAYOUT */
.main-layout{
    display:flex;
    gap:20px;
}

.left-panel{ flex:2; }

.right-panel{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:15px;
}

/* TABLA */
table{
    width:100%;
    table-layout:fixed;
    border-collapse:collapse;
    background:white;
    border-radius:12px;
    overflow:hidden;
}

th{
    background:#343a40;
    color:white;
    padding:10px;
    text-align:left;
}

td{
    padding:10px;
    border-bottom:1px solid #eee;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

tbody tr:nth-child(even){
    background:#f8f9fa;
}

/* CARDS */
.card{
    padding:15px;
    border-radius:12px;
    color:white;
    text-align:center;
}

.blue{background:#007bff;}
.green{background:#28a745;}
.gray{background:#6c757d;}
.red{background:#dc3545;}
.purple{background:#6f42c1;}
.pink{background:#e83e8c;}

.ocupado{ color:#28a745; font-weight:bold; }
.vacio{ color:#6c757d; font-weight:bold; }
.fuera{ color:#dc3545; font-weight:bold; }

.insight{
    background:#fff3cd;
    padding:12px;
    border-radius:10px;
    font-size:13px;
}
.btn-danger{
    background:#000;
    padding:12px;
    border-radius:10px;
    color:white;
    border:none;
    cursor:pointer;
}
.btn-info{
    background:#17a2b8;
    padding:12px;
    border-radius:10px;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>
<button onclick="borrarTodo()" class="btn-danger">🧨 Reiniciar Censo</button>
<button onclick="exportarExcel()" class="btn-info">📊 Descargar Excel</button>

<h2>🛏️ Censo Trailas Cajon</h2>

<!-- ZONAS -->
<div class="zonas-box">
    <div class="zonas-header">
        <h3>📍 Zonas</h3>
        <span id="total-zonas"></span>
    </div>
    <div class="bars" id="zonas-bars"></div>
</div>

<div class="main-layout">

<div class="left-panel">
<table>
<thead>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Apellidos</th>
<th>Traila</th>
<th>Cama</th>
<th>Sexo</th>
<th>Zona</th>
<th>Estado</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<div class="right-panel">

<h3>📊 Dashboard</h3>

<div class="card blue">Total<h2 id="total">0</h2></div>
<div class="card green">Ocupadas<h2 id="ocupadas">0</h2></div>
<div class="card gray">Vacías<h2 id="vacias">0</h2></div>
<div class="card red">Fuera<h2 id="fuera">0</h2></div>
<div class="card purple">Hombres<h2 id="hombres">0</h2></div>
<div class="card pink">Mujeres<h2 id="mujeres">0</h2></div>

<div class="insight">
<b>Insight:</b>
<p id="insight-text"></p>
</div>

</div>

</div>

<script>

// 🔥 CONFIG
var firebaseConfig = {
 apiKey: "AIzaSyDz4RqKjSJxB0F5eP4RzajQtW94cPXmpSg",
 databaseURL: "https://data-b6691-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

let lista = [];
let trabajadores = {};

let dataCenso = false;
let dataTrabajadores = false;

// 🔥 TRABAJADORES
db.ref("trabajadores").on("value", snapshot => {
    trabajadores = snapshot.val() || {};
    dataTrabajadores = true;
    intentarRender();
});

// 🔥 CENSO
db.ref("censo_cajon").on("value", snapshot => {

    lista = [];

    snapshot.forEach(child => {
        let d = child.val();

        lista.push({
            id:d.id,
            nombre:d.nombre,
            apellidos:d.apellidos,
            traila:d.traila,
            cama:d.cama,
            sexo:d.sexo,
            estado:d.estado
        });
    });

    dataCenso = true;
    intentarRender();
});

// 🔥 CONTROL
function intentarRender(){
    if(dataCenso && dataTrabajadores){
        render();
    }
}

// 🔥 RENDER
function render(){

    if(lista.length === 0){
        document.getElementById("tabla").innerHTML =
        "<tr><td colspan='8'>Sin datos</td></tr>";
        return;
    }

    let html="";
    let ocupadas=0,vacias=0,fuera=0,hombres=0,mujeres=0;
    let zonas={};

    lista.forEach(p=>{

        let clase = p.estado==="OCUPADO"?"ocupado":
                    p.estado==="FUERA"?"fuera":"vacio";

        if(p.estado==="OCUPADO") ocupadas++;
        else if(p.estado==="VACIA") vacias++;
        else if(p.estado==="FUERA") fuera++;

        if(p.sexo==="MASCULINO") hombres++;
        if(p.sexo==="FEMENINO") mujeres++;

        let zona = trabajadores[p.id]?.zona || "SIN ZONA";
        zonas[zona]=(zonas[zona]||0)+1;

        html+=`
        <tr>
        <td>${p.id}</td>
        <td>${p.nombre}</td>
        <td>${p.apellidos}</td>
        <td>${p.traila}</td>
        <td>${p.cama}</td>
        <td>${p.sexo}</td>
        <td>${zona}</td>
        <td class="${clase}">${p.estado}</td>
        </tr>`;
    });

    document.getElementById("tabla").innerHTML=html;

    document.getElementById("total").innerText=lista.length;
    document.getElementById("ocupadas").innerText=ocupadas;
    document.getElementById("vacias").innerText=vacias;
    document.getElementById("fuera").innerText=fuera;
    document.getElementById("hombres").innerText=hombres;
    document.getElementById("mujeres").innerText=mujeres;
    document.getElementById("total-zonas").innerText=lista.length+" personas";

    let max = Math.max(...Object.values(zonas));
    let colores = ["#3b82f6","#22c55e","#f59e0b","#ef4444","#8b5cf6"];

    let zhtml="";

    Object.entries(zonas)
    .sort((a,b)=>b[1]-a[1])
    .forEach(([zona,val],i)=>{
        let h=(val/max)*150;
        let porcentaje=((val/lista.length)*100).toFixed(1);

        zhtml+=`
        <div class="bar">
            <div class="fill" style="height:${h}px;background:${colores[i%colores.length]}"></div>
            <small>${val} (${porcentaje}%)</small>
            <div style="font-size:10px">${zona}</div>
        </div>`;
    });

    document.getElementById("zonas-bars").innerHTML=zhtml;

    let porcentaje=((ocupadas/lista.length)*100).toFixed(1);

    let texto="";
    if(porcentaje>80) texto="🔥 Alta ocupación";
    else if(porcentaje>50) texto="⚠️ Ocupación media";
    else texto="🟢 Baja ocupación";

    document.getElementById("insight-text").innerText =
    `${texto} (${porcentaje}%)`;
}
// BORRAR
function borrarTodo(){
    if(confirm("⚠️ Esto borrará todo el censo. ¿Continuar?")){
        db.ref("censo_cajon").remove();
    }
}

// EXCEL
function exportarExcel(){
    let ws = XLSX.utils.json_to_sheet(lista);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Censo");
    XLSX.writeFile(wb, "censo.xlsx");
}
</script>

</body>
</html>
